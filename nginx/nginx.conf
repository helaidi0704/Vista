upstream frontend {
    server ui:3000;
}

upstream api {
    server api:8000;
}

upstream minio {
    server minio:9000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API REST
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API WebSocket
    location /api/v1/ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # API docs
    location /docs {
        proxy_pass http://api;
    }
    location /redoc {
        proxy_pass http://api;
    }
    location /openapi.json {
        proxy_pass http://api;
    }

    # Health
    location /health {
        proxy_pass http://api;
    }

    # MinIO presigned URL access
    location /storage/ {
        proxy_pass http://minio/;
        proxy_set_header Host $host;
    }
}
