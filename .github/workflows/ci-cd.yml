name: VISTA CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ai-use-cases-486914
  ZONE: europe-west4-a
  INSTANCE: vista-server

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # JOB 1 — Lint & Type Check
  # ═══════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install ruff mypy

      - name: Lint backend
        run: ruff check backend/ --select E,W,F --ignore E501
        continue-on-error: true

      - name: Lint workers
        run: |
          ruff check worker-gpu/ --select E,W,F --ignore E501
          ruff check worker-cpu/ --select E,W,F --ignore E501
        continue-on-error: true

      - name: Lint MLOps modules
        run: ruff check mlops/ --select E,W,F --ignore E501
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint frontend
        run: |
          cd frontend
          npm install
          npx next lint || true

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2 — Backend Tests
  # ═══════════════════════════════════════════════════════════════════
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vista_test
          POSTGRES_USER: vista
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vista"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: vista_test
          POSTGRES_USER: vista
          POSTGRES_PASSWORD: test_password
          REDIS_URL: redis://localhost:6379/0
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: testtest
          SECRET_KEY: test-secret-key
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || echo "No tests found yet — add tests in backend/tests/"

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3 — Build Docker Images
  # ═══════════════════════════════════════════════════════════════════
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t vista-api:${{ github.sha }} ./backend

      - name: Build Frontend image
        run: docker build -t vista-ui:${{ github.sha }} ./frontend

      - name: Build CPU Worker image
        run: docker build -t vista-worker-cpu:${{ github.sha }} ./worker-cpu

      - name: Build MLflow image
        run: docker build -t vista-mlflow:${{ github.sha }} ./mlflow

      - name: Images built successfully
        run: docker images | grep vista

  # ═══════════════════════════════════════════════════════════════════
  # JOB 4 — Deploy to GCP (main branch only)
  # ═══════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to VM
        run: |
          # Create archive
          tar --exclude='node_modules' --exclude='.next' --exclude='__pycache__' \
              --exclude='.git' -czf /tmp/vista.tar.gz .

          # Upload to VM
          gcloud compute scp /tmp/vista.tar.gz \
              ${{ env.INSTANCE }}:/tmp/ \
              --zone=${{ env.ZONE }} --quiet

          # Deploy on VM
          gcloud compute ssh ${{ env.INSTANCE }} \
              --zone=${{ env.ZONE }} --quiet \
              --command="cd /opt/vista && \
                tar -xzf /tmp/vista.tar.gz && \
                rm /tmp/vista.tar.gz && \
                docker compose down && \
                docker compose up -d --build && \
                echo 'Deployment complete'"

      - name: Health check
        run: |
          EXTERNAL_IP=$(gcloud compute instances describe ${{ env.INSTANCE }} \
              --zone=${{ env.ZONE }} \
              --format="value(networkInterfaces[0].accessConfigs[0].natIP)")
          sleep 60
          curl -f http://${EXTERNAL_IP}:8000/health || echo "Health check pending..."
