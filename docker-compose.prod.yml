###############################################################################
# VISTA — Docker Compose Production Override (GCP)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
###############################################################################

version: "3.9"

services:
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://${EXTERNAL_IP:-localhost}:8000
      NEXT_PUBLIC_WS_URL: ws://${EXTERNAL_IP:-localhost}:8000
      NEXT_PUBLIC_MINIO_URL: http://${EXTERNAL_IP:-localhost}:9000
    restart: always

  api:
    environment:
      API_RELOAD: "false"
      LOG_LEVEL: warning
    volumes: []  # No hot-reload in prod
    restart: always

  worker-gpu:
    restart: always

  worker-cpu:
    restart: always

  db:
    restart: always

  redis:
    restart: always

  minio:
    restart: always
