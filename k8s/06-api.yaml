apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: vista
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: europe-west4-docker.pkg.dev/ai-use-cases-486914/vista-repo/vista-api:v4
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: vista-config
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: vista-secrets
              key: POSTGRES_PASSWORD
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: vista-secrets
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: vista-secrets
              key: MINIO_SECRET_KEY
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: vista-secrets
              key: SECRET_KEY
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: vista
spec:
  selector:
    app: api
  ports:
  - port: 8000
    targetPort: 8000
