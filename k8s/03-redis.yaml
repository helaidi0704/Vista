apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redisdata
  namespace: vista
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: vista
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redisdata
          mountPath: /data
        resources:
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: redisdata
        persistentVolumeClaim:
          claimName: redisdata
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: vista
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
