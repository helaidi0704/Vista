apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: vista
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: europe-west4-docker.pkg.dev/ai-use-cases-486914/vista-repo/vista-mlflow:v4
        ports:
        - containerPort: 5000
        resources:
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: vista
spec:
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000
